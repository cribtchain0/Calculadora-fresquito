services:
  - type: web
    name: fresquito-finanzas
    runtime: node
    plan: starter
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: FRESQUITO_DB_PATH
        value: /data/fresquito.db
    disk:
      name: fresquito-data
      mountPath: /data
      sizeGB: 1
